services:

  postgres:
    image: postgres:16
    container_name: n8n_database_postgres
    restart: always
    env_file:
      - .env
    networks:
      - default
    volumes:
      - ${POSTGRES_DATA}:/var/lib/postgresql/data
  
  n8n:
    image: n8nio/n8n:2.19.2-amd64
    container_name: n8n
    env_file:
      - .env
    networks:
      - default
    volumes:
      - ${N8N_DATA}:/root/.n8n
      - ${N8N_BACKUP}:/home/node/backup
    restart: always
  
  task-runners:
    image: n8nio/runners:2.19.2-amd64
    container_name: n8n-runners
    networks:
      - default
    # volumes:
    #   - ./n8n-task-runners.json:/etc/n8n-task-runners.json
    env_file:
      - .env
    depends_on:
      - n8n


networks:
  default: